services:
  mlflow:
    image: ghcr.io/mlflow/mlflow
    container_name: mlflow_server
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow_data:/mlflow_data
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow_data/mlflow.db
      --artifacts-destination /mlflow_data/artifacts
      --serve-artifacts
      --allowed-hosts "*"

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: fraud_api
    ports:
      - "8000:8000"
    depends_on:
      - mlflow
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - FRAUD_THRESHOLD=0.10
